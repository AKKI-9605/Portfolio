
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Goals | Akki</title>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#020617;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* PARTICLES */

#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* GOALS CARD */

.container{
background:#0f172a;
padding:60px;
border-radius:20px;
width:600px;
text-align:center;
box-shadow:0 0 40px rgba(56,189,248,0.15);
}

h1{
color:#38bdf8;
margin-bottom:30px;
font-size:42px;
}

/* GOALS */

.goal{
background:#1e293b;
padding:18px;
border-radius:12px;
margin:15px 0;
font-size:18px;
transition:0.3s;
}

.goal:hover{
transform:scale(1.05);
background:#334155;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:30px;
padding:14px 28px;
background:#2563eb;
border-radius:8px;
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

.btn:hover{
background:#1d4ed8;
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:650px){

.container{
width:90%;
padding:40px;
}

}

</style>

</head>

<body>

<div id="particles-js"></div>

<div class="container">

<h1>My Goals</h1>

<div class="goal">Build innovative and impactful projects</div>

<div class="goal">Continuously learn new technologies</div>

<div class="goal">Contribute to open source communities</div>

<div class="goal">Enhance my portfolio with creative designs</div>

<div class="goal">Collaborate with talented developers</div>

<a class="btn" href="index.html">Back to Home</a>

</div>

<script>

particlesJS("particles-js", {
  particles: {
    number: { value: 70 },
    color: { value: "#38bdf8" },
    shape: { type: "circle" },
    opacity: { value: 0.6 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#38bdf8",
      opacity: 0.4,
      width: 1
    },
    move: {
      enable: true,
      speed: 2
    }
  }
});

</script>

</body>
</html>
